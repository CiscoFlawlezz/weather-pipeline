# ============================================================
# Weather Pipeline Configuration
# ============================================================
# STATUS (2026-07-15): All five city mappings are CONFIRMED against
# two independent primary sources that agree:
#
#   1. Kalshi's machine-readable settlement_sources (GET /series/{ticker}),
#      which names the exact NWS CLI product each contract settles on via
#      a forecast.weather.gov product.php URL carrying site= and issuedby=.
#   2. The Architect's direct read of each Kalshi rules page, 2026-07-09.
#
# KEY IDENTITY: Kalshi's `issuedby` parameter == the NWS CLI
# `cli_location_id`. These were derived independently -- cli_location_id
# was discovered by probing the NWS API, and Kalshi publishes issuedby as
# its settlement source. They match for all five cities.
#
# Each Kalshi weather market settles on ONE specific NWS station, and a
# wrong station mapping silently corrupts everything downstream. That
# check is COMPLETE for all five cities (see per-city notes). Re-confirm
# if Kalshi re-points a market: nothing in the pipeline detects drift in
# settlement_sources today.
#
# `verified: true` means: this city's station_id is confirmed against the
# Kalshi rules page / settlement source. It is a human-facing annotation --
# no code reads it (grep-confirmed 2026-07-15).
#
# All of the above is E4 pending Architect ratification (Invariant 3),
# except the 2026-07-09 rules-page reads, which are Architect-direct.

kalshi:
  # Public market-data base URL (no authentication required for reads)
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  # Candlestick interval in minutes for daily sweeps: 60 = hourly.
  # Valid values per API docs: 1, 60, 1440.
  candlestick_interval: 60

nws:
  base_url: "https://api.weather.gov"
  # NWS requests a descriptive User-Agent identifying your app.
  # The email is how NWS contacts you if your traffic causes a
  # problem (instead of just blocking you).
  user_agent: "prediction-market-research-lab (ryaneastnc@gmail.com)"

cities:
  phoenix:
    # CONFIRMED 2026-07-15: settlement_sources -> product.php?site=PSR&issuedby=PHX
    # cert GLOBALTEMPERATURE.pdf. The 'T' in the ticker is real; title form
    # differs from the other four ("Phoenix High Temperature Daily").
    kalshi_series: "KXHIGHTPHX"
    station_id: "KPHX"
    # CONFIRMED via live API 2026-07-13: CLIPHX, issuingOffice KPSR,
    # "NATIONAL WEATHER SERVICE PHOENIX AZ". Equals Kalshi issuedby.
    cli_location_id: "PHX"
    lat: 33.4484
    lon: -112.0740
    verified: true

  nyc:
    # CONFIRMED 2026-07-15: settlement_sources -> product.php?site=OKX&issuedby=NYC
    # cert NHIGH.pdf
    kalshi_series: "KXHIGHNY"
    # VERIFIED "Central Park, New York" (Architect rules-page read 2026-07-09);
    # corroborated by settlement_sources 2026-07-15.
    station_id: "KNYC"
    # CONFIRMED 2026-07-15 via live API: CLINYC, issuingOffice KOKX,
    # "THE CENTRAL PARK NY CLIMATE SUMMARY". Equals Kalshi issuedby.
    # NOT LGA (CLILGA) and NOT JFK (CLIJFK) -- distinct products, proven by
    # differing sha256 of the product bodies.
    cli_location_id: "NYC"
    lat: 40.7789
    lon: -73.9692
    verified: true

  chicago:
    # CONFIRMED 2026-07-15: settlement_sources -> product.php?site=LOT&issuedby=MDW
    # source name "NWS Climatological Report Chicago Midway"; cert CHIHIGH.pdf
    kalshi_series: "KXHIGHCHI"
    # VERIFIED "Chicago Midway, Illinois" (Architect rules-page read 2026-07-09);
    # corroborated by settlement_sources 2026-07-15.
    station_id: "KMDW"
    # CONFIRMED 2026-07-15 via live API: CLIMDW, issuingOffice KLOT,
    # "THE CHICAGO-MIDWAY CLIMATE SUMMARY". Equals Kalshi issuedby.
    # NOT ORD (CLIORD = O'Hare) and NOT LOT (CLILOT = Romeoville WFO) --
    # distinct products, proven by differing sha256.
    cli_location_id: "MDW"
    lat: 41.7868
    lon: -87.7522
    verified: true

  miami:
    # CONFIRMED 2026-07-15: settlement_sources -> product.php?site=MFL&issuedby=MIA
    # cert MIAHIGH.pdf
    kalshi_series: "KXHIGHMIA"
    # VERIFIED "Miami, FL" (Architect rules-page read 2026-07-09);
    # corroborated by settlement_sources 2026-07-15.
    station_id: "KMIA"
    # CONFIRMED 2026-07-15 via live API: CLIMIA, issuingOffice KMFL,
    # "THE MIAMI CLIMATE SUMMARY". Equals Kalshi issuedby.
    # NOT FLL (CLIFLL = Fort Lauderdale) -- distinct product, proven by sha256.
    cli_location_id: "MIA"
    # UNENCODED RULE: an 11am ET delay applies (Architect read 2026-07-09;
    # exact rulebook text NOT yet captured). Affects settlement mapping,
    # NOT collection. Primary source: MIAHIGH.pdf. Open Item #4 / F3.
    lat: 25.7933
    lon: -80.2906
    verified: true

  austin:
    # CONFIRMED 2026-07-15: settlement_sources -> product.php?site=EWX&issuedby=AUS
    # cert AUSHIGH.pdf
    kalshi_series: "KXHIGHAUS"
    # VERIFIED "Austin Bergstrom" (Architect rules-page read 2026-07-09);
    # corroborated by settlement_sources 2026-07-15.
    station_id: "KAUS"
    # CONFIRMED 2026-07-15 via live API: CLIAUS, issuingOffice KEWX,
    # "THE AUSTIN BERGSTROM CLIMATE SUMMARY". Equals Kalshi issuedby.
    # NOT ATT (CLIATT = Camp Mabry) -- distinct product, proven by sha256.
    cli_location_id: "AUS"
    # UNENCODED RULE: an 11am ET delay applies; market trades CT (Architect
    # read 2026-07-09; exact rulebook text NOT yet captured). Affects
    # settlement mapping, NOT collection. Primary source: AUSHIGH.pdf.
    # Open Item #4 / F3.
    lat: 30.1975
    lon: -97.6664
    verified: true

# ============================================================
# Collection cadence -- added for M2.T4 (CLI collector) + scheduler
# ============================================================
# How often each collector fetches. The CLI Daily Climate Report
# is published once per station per day (and occasionally amended),
# so a single daily sweep with a safety re-check is sufficient;
# amendments land as new append-only rows, never overwrites.
#
# The values below are cadence INTENT that config.py exposes and
# the collector/scheduler read. No collector hardcodes a cadence.
# Times are local clock times for the scheduler (exported Task
# Scheduler XML); the collector itself is time-agnostic.
#
# NOTE: sweep times are reasoned defaults, NOT verified against
# observed CLI posting/amendment times for the five stations.
# Adjust once real posting times are known (see Open Questions).
collection:
  nws_cli:
    # Deployed schedule = 3 Task Scheduler runs (see scheduler/*.xml).
    # 18:00 primary, 23:30 amendment recheck, 00:30 final safety sweep.
    # Amendments/later reports append as new rows; the collector is
    # idempotent by product_id so extra sweeps never duplicate.
    sweeps_per_day: 3
    primary_sweep_local: "18:00"
    amendment_recheck_local: "23:30"
    final_sweep_local: "00:30"

  # ----------------------------------------------------------
  # Kalshi order-book depth + market-state observations (M1.T2)
  # ----------------------------------------------------------
  # One observation = one order book fetch + one market fetch for a
  # ticker, both succeeding, written atomically. This is [ACC][IRR]
  # data: candlestick OHLC does not preserve the bid/ask ladder, so
  # any interval not sampled here is lost permanently.
  #
  # cadence_minutes is the sampling interval. The collector runs one
  # sweep per invocation; the scheduler fires it every cadence_minutes.
  # Changing 5 -> 1 is a config edit plus a scheduler interval change,
  # with NO code or schema change. 5 min captures the large majority of
  # intraday depth movement at gentle API load (~120 requests spread
  # over a 5-minute window vs the Basic-tier ~20 reads/sec ceiling).
  kalshi_observations:
    cadence_minutes: 5
