# ============================================================
# Weather Pipeline Configuration — Milestone 1a
# ============================================================
# IMPORTANT: The series tickers below are CANDIDATES, not verified
# facts. Only KXHIGHTPHX (Phoenix) has been confirmed against a
# live Kalshi market URL. Run `python test_connections.py` to
# empirically verify which series exist before trusting this list.
#
# Each Kalshi weather market settles on ONE specific NWS station.
# A wrong station mapping silently corrupts all downstream data,
# so every station_id below must be verified against the official
# market rules page on kalshi.com before Milestone 1b collection
# begins. Verification status is tracked per city.

kalshi:
  # Public market-data base URL (no authentication required for reads)
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  # Candlestick interval in minutes for daily sweeps: 60 = hourly.
  # Valid values per API docs: 1, 60, 1440.
  candlestick_interval: 60

nws:
  base_url: "https://api.weather.gov"
  # NWS requests a descriptive User-Agent identifying your app.
  # Replace the email with yours — it's how NWS contacts you if
  # your traffic causes a problem (instead of just blocking you).
  user_agent: "prediction-market-research-lab (ryaneastnc@gmail.com)"

cities:
  phoenix:
    kalshi_series: "KXHIGHTPHX"     # series exists (live market URL + test_connections)
    station_id: "KPHX"              # VERIFIED: Phoenix Sky Harbor, Kalshi rules 2026-07-09
    lat: 33.4484
    lon: -112.0740
    verified: true
  nyc:
    kalshi_series: "KXHIGHNY"       # series exists per test_connections; NOT confirmed via rules page
    station_id: "KNYC"              # VERIFIED: "Central Park, New York" (NHIGH rules, wfo=okx) 2026-07-09
    lat: 40.7789
    lon: -73.9692
    verified: true
  chicago:
    kalshi_series: "KXHIGHCHI"      # series exists per test_connections; NOT confirmed via rules page
    station_id: "KMDW"              # VERIFIED: "Chicago Midway, Illinois" (CHIHIGH rules, wfo=lot) 2026-07-09
    lat: 41.7868
    lon: -87.7522
    verified: true
  miami:
    kalshi_series: "KXHIGHMIA"      # series exists per test_connections; NOT confirmed via rules page
    station_id: "KMIA"              # VERIFIED: "Miami, FL" (MIAHIGH rules) 2026-07-09; 11am ET delay rule applies
    lat: 25.7933
    lon: -80.2906
    verified: true
  austin:
    kalshi_series: "KXHIGHAUS"      # series exists per test_connections; NOT confirmed via rules page
    station_id: "KAUS"              # VERIFIED: "Austin Bergstrom" (AUSHIGH rules) 2026-07-09; trades CT; 11am ET delay rule
    lat: 30.1975
    lon: -97.6664
    verified: true

# ============================================================
# Collection cadence — added for M2.T4 (CLI collector) + scheduler
# ============================================================
# How often each collector fetches. The CLI Daily Climate Report
# is published once per station per day (and occasionally amended),
# so a single daily sweep with a safety re-check is sufficient;
# amendments land as new append-only rows, never overwrites.
#
# The values below are cadence INTENT that config.py exposes and
# the collector/scheduler read. No collector hardcodes a cadence.
# Times are local clock times for the scheduler (exported Task
# Scheduler XML); the collector itself is time-agnostic.
#
# NOTE: sweep times are reasoned defaults, NOT verified against
# observed CLI posting/amendment times for the five stations.
# Adjust once real posting times are known (see Open Questions).
collection:
  nws_cli:
    sweeps_per_day: 2
    primary_sweep_local: "18:00"
    amendment_recheck_local: "23:30"
